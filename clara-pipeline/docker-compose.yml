version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: clara-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_LOG_LEVEL=info
      # Optional: persist workflows
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount outputs directory so n8n can write files
      - ./outputs:/output
      # Mount data directory so n8n can read transcripts
      - ./data:/data:ro

volumes:
  n8n_data:
    driver: local
